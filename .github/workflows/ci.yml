---
name: CI
permissions: {}

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: "Commit SHA to build (defaults to current HEAD)"
        required: false
        default: ""
        type: string
      release_version:
        description: "Version string (e.g. 0.23.0)"
        required: false
        default: "0.0.0"
        type: string

jobs:
  build-windows:
    name: Windows AMD64
    permissions:
      contents: read
    uses: ./.github/workflows/ci-windows.yml
    with:
      release_commit: ${{ inputs.release_commit || github.sha }}
      release_version: ${{ inputs.release_version || '0.0.0' }}

  build-macos:
    name: macOS 26
    permissions:
      contents: read
    uses: ./.github/workflows/ci-homebrew.yml
    with:
      git_username: ${{ github.actor }}
      publish_release: "false"
      release_commit: ${{ inputs.release_commit || github.sha }}
      release_tag: ${{ inputs.release_version || '0.0.0' }}
      release_version: ${{ inputs.release_version || '0.0.0' }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GIT_EMAIL: ${{ secrets.GH_BOT_EMAIL }}
